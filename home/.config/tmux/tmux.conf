# core
set -g default-terminal 'screen-256color'
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -s escape-time 0
set -g history-limit 10000
set -g mouse on
set -g focus-events on

# keybinds
# -- prefix
set -g prefix C-space
unbind C-b
bind C-space send-prefix

# -- nerd
setw -g mode-keys vi
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R
bind -r C-h select-window -t :-
bind -r C-l select-window -t :+

# -- arrow key movement be gone
unbind Up
unbind Down
unbind Left
unbind Right

# -- copy mode (prefix+[, v=select, y=yank)
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-selection-and-cancel

# -- splits (open in cwd)
bind - split-window -v -c "#{pane_current_path}"
bind | split-window -h -c "#{pane_current_path}"

# instant kill pane
bind x display "killed #P" \; kill-pane

# -- unbinds
unbind r
unbind '"'
unbind %

# -- reload
bind r source-file ~/.config/tmux/tmux.conf \; display "reloaded"

# color palette (catppuccin mocha)
base="#1e1e2e"
mantle="#181825"
surface0="#313244"
overlay1="#7f849c"
subtext1="#b4befe"
text="#cdd6f4"
green="#a6e3a1"
mauve="#cba6f7"

# status bar
set -g status on
set -g status-interval 60
set -g status-position top
set -g status-style "bg=$mantle,fg=$overlay1"

# left: session name
set -g status-left "#[bg=$mauve,fg=$base,bold] #S #[bg=$mantle,fg=$mauve] "
set -g status-left-length 30

# right: date + time
set -g status-right "#[fg=$overlay1]%a %d  #[fg=$subtext1]%H:%M "
set -g status-right-length 40

# windows
set -g window-status-format         "#[fg=$overlay1] #I #W "
set -g window-status-current-format "#[fg=$text,bold] #I #W "
set -g window-status-separator ""

# pane borders
set -g pane-border-style "fg=$surface0"
set -g pane-active-border-style "fg=$mauve"

# messages
set -g message-style "bg=$surface0,fg=$text"

# plugins
set -g @plugin 'tmux-plugins/tpm'
run '~/.config/tmux/plugins/tpm/tpm'
