"$schema" = 'https://starship.rs/config-schema.json'

# inspo: https://starship.rs/presets/pure-preset

format = """
$username\
$hostname\
$directory\
$git_branch\
$git_state\
$git_status\
$cmd_duration\
$line_break\
$python\
$golang\
$nodejs\
$rust\
$docker_context\
$character"""

# --- top prompt, user, dir, dur

[character]
success_symbol = "[╬╗](fg:#d4c5e2)"
error_symbol = "[╧Κ](fg:#ffb5a7)"
vimcmd_symbol = "[╬┤](fg:#b8c9d8)"

[username]
show_always = true
format = "[$user]($style) "
style_user = "fg:#d4c5e2"
style_root = "fg:#ffb5a7"

[directory]
style = "bright-black"
home_symbol = "?"

[cmd_duration]
format = "[$duration]($style) "
style = "bright-black"
show_milliseconds = false

# --- git related

[git_branch]
format = "[$branch]($style)"
style = "bright-black"

[git_status]
format = "[[(*$conflicted$untracked$modified$staged$renamed$deleted)](218) ($ahead_behind$stashed)]($style)"
style = "fg:#d4c5e2"
conflicted = "έΑΜ"
untracked = "έΑΜ"
modified = "έΑΜ"
staged = "έΑΜ"
renamed = "έΑΜ"
deleted = "έΑΜ"
stashed = "έΚκ"
ahead = "+${count} "
behind = "-${count} "
diverged = "+${ahead_count}-${behind_count} "

[git_state]
format = '\([$state( $progress_current/$progress_total)]($style)\) '
style = "bright-black"

# --- languages

[python]
format = '[$virtualenv$symbol]($style) '
symbol = "ΏθΡΞ"
style = "fg:#a8e6a3"
detect_extensions = ["py"]
detect_files = ["pyproject.toml", "requirements.txt", "setup.py", ".python-version", "Pipfile"]

[golang]
format = '[$symbol]($style) '
symbol = "ΏθΡ╣"
# style = "fg:#a8d8ea"
detect_extensions = ["go"]
detect_files = ["go.mod", "go.sum"]

[nodejs]
format = '[$symbol]($style) '
symbol = "ΏθΥο"
# style = "fg:#ffd989"
detect_extensions = ["js", "ts", "mjs", "cjs"]
detect_files = ["package.json", ".nvmrc", ".node-version"]
detect_folders = ["node_modules"]

[rust]
format = '[$symbol]($style) '
symbol = "ΏθοΑ"
# style = "fg:#ffb5a7"
detect_extensions = ["rs"]
detect_files = ["Cargo.toml"]

[docker_context]
format = '[$symbol$context]($style) '
symbol = "ΏθΡ│"
style = "fg:#a8d8ea"
only_with_files = true
